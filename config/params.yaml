# ════════════════════════════════════════════════════════════════════════════
# JB Legacy — 금융 파라미터 단일 출처 (Single Source of Truth)
#
# 세법 개정·은행 금리 변경·물가 전망 수정 시, 코드 수정 없이 이 파일만 고치면
# 앱 구동 시 자동 반영된다. (calculators / monte_carlo / post_exit_wm 이 참조)
# ════════════════════════════════════════════════════════════════════════════
meta:
  version: "2026-07-05"
  source: "국세청 공식 세율(2025) · 조특법 제30조의6 · 상속세및증여세법"

# ── 종합소득세 누진 구간: [과세표준 상한(원), 세율, 누진공제액(원)] ──────────
income_tax:
  brackets:
    - [14000000, 0.06, 0]
    - [50000000, 0.15, 1260000]
    - [88000000, 0.24, 5760000]
    - [150000000, 0.35, 15440000]
    - [300000000, 0.38, 19940000]
    - [500000000, 0.40, 25940000]
    - [1000000000, 0.42, 35940000]
    - [.inf, 0.45, 65940000]

# 지방소득세 = 산출세액 × 10%
local_tax_ratio: 0.1

# ── 권리금(사업체 가치평가) ──────────────────────────────────────────────────
goodwill:
  taxable_ratio: 0.4        # 기타소득 과세표준 = 권리금 × 40% (필요경비 60% 인정)
  multiples:                # 업력별 권리금 배수(개월)
    under_10y: 24
    under_20y: 30
    over_20y: 36

# ── 가업승계 증여세 과세특례 (조특법 제30조의6) ──────────────────────────────
gift_tax_special:
  min_years: 10             # 가업 영위 최소 연수 (미충족 시 일반 증여세로 전환)
  deduction: 1000000000     # 10억원 공제
  rate_base: 0.10           # 과세표준 60억 이하 10%
  rate_over: 0.20           # 60억 초과분 20%
  threshold_over: 6000000000
  limit: 60000000000        # 한도 600억

# ── 일반 증여세 (상속세및증여세법): [과세표준 상한, 세율, 누진공제] ──────────
gift_tax_general:
  child_deduction: 50000000 # 성인 자녀 기본공제 5천만
  brackets:
    - [100000000, 0.10, 0]
    - [500000000, 0.20, 10000000]
    - [1000000000, 0.30, 60000000]
    - [3000000000, 0.40, 160000000]
    - [.inf, 0.50, 460000000]

# ── 상권 트렌드별 연 매출 성장률(권리금 미래가치) ────────────────────────────
market_growth:
  성장: 0.05
  보합: 0.01
  하락: -0.03

# ── 은퇴자산 생존 확률 시뮬레이션 (몬테카를로) ───────────────────────────────
monte_carlo:
  sims: 1000
  seed: 42
  max_shocks_per_month: 5
  medical_shock:
    lam_annual: 0.25        # 의료비 쇼크 연평균 발생 횟수(포아송)
    avg_shock: 30000000     # 1회 평균 지출액(지수분포)
  inflation_rate: 0.02      # 생활비·국민연금 연 물가연동
  start_age: 62
  target_survival: 85       # goal-seek 목표 생존 확률(%)

# ── 은퇴 포트폴리오 운용 가정 ────────────────────────────────────────────────
wm:
  annuity_expense_ratio: 0.07  # 즉시연금 사업비(보험업계 평균)
  irp_ratio: 0.15              # IRP 세액공제 목적 최소 비중
  deposit_tax: 0.154           # 이자소득세(정기예금)
  pension_tax: 0.055           # 연금소득세 평균
  inflation_rate: 0.02
  risk_returns:                # 위험성향별 [연 기대수익률, 표준편차]
    conservative: [0.030, 0.010]
    balanced: [0.033, 0.012]
    growth: [0.036, 0.015]
